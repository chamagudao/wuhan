<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乡村小院租房登记</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"微软雅黑",sans-serif;background:#f5f7fa;color:#333;}
header{background:#2c3e50;color:#fff;padding:1rem;text-align:center;}
.container{max-width:800px;margin:1rem auto;padding:0 1rem;}
.card{background:#fff;padding:1.5rem;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);margin-bottom:2rem;}
h2{margin-bottom:1rem;color:#2c3e50;text-align:center;}
.form-group{margin-bottom:1rem;}
label{display:block;margin-bottom:0.5rem;font-weight:bold;}
input,select,textarea{width:100%;padding:0.75rem;border:1px solid #ddd;border-radius:6px;font-size:1rem;}
button{background:#2980b9;color:#fff;border:none;padding:0.8rem 1.5rem;border-radius:6px;font-size:1rem;width:100%;cursor:pointer;}
button:hover{background:#1f6aa5;}
.tabs{display:flex;margin-bottom:1rem;border-radius:6px;overflow:hidden;}
.tab{flex:1;text-align:center;padding:0.8rem;background:#eee;cursor:pointer;font-weight:bold;}
.tab.active{background:#2980b9;color:#fff;}
#admin-bar{display:none;}
</style>
</head>
<body>

<header>
  <h1>乡村小院租房登记</h1>
</header>

<div class="container">
  <div class="tabs">
    <div class="tab active" onclick="showPanel('landlord')">房东房源登记</div>
    <div class="tab" onclick="showPanel('renter')">租客求租登记</div>
  </div>

  <!-- 房东表单 -->
  <div id="landlord" class="card">
    <h2>房东房源登记</h2>
    <div class="form-group">
      <label>业主姓名</label>
      <input id="ll-name" type="text" placeholder="请输入姓名">
    </div>
    <div class="form-group">
      <label>联系电话</label>
      <input id="ll-phone" type="tel" placeholder="请输入手机号">
    </div>
    <div class="form-group">
      <label>小院位置（江夏XX村）</label>
      <input id="ll-address" placeholder="例如：江夏区五里界镇XX村">
    </div>
    <div class="form-group">
      <label>户型（几室几厅+院子）</label>
      <input id="ll-house-type" placeholder="例如：3室2厅，独门独院">
    </div>
    <div class="form-group">
      <label>是否独门独院</label>
      <select id="ll-alone">
        <option>是</option>
        <option>否</option>
      </select>
    </div>
    <div class="form-group">
      <label>能否拎包入住</label>
      <select id="ll-ready">
        <option>能</option>
        <option>否</option>
      </select>
    </div>
    <div class="form-group">
      <label>期望月租（元）</label>
      <input id="ll-price" type="number">
    </div>
    <div class="form-group">
      <label>租赁类型（长租/短租/周末）</label>
      <input id="ll-term" placeholder="例：长租,短租">
    </div>
    <div class="form-group">
      <label>配套（停车/水电/菜园）</label>
      <input id="ll-facility" placeholder="例：停车,民用水电">
    </div>
    <div class="form-group">
      <label>备注</label>
      <textarea id="ll-remark" rows="3"></textarea>
    </div>
    <button onclick="submitLandlord()">提交房源信息</button>
  </div>

  <!-- 租客表单 -->
  <div id="renter" class="card" style="display:none;">
    <h2>租客求租登记</h2>
    <div class="form-group">
      <label>姓名</label>
      <input id="rt-name" type="text">
    </div>
    <div class="form-group">
      <label>联系电话</label>
      <input id="rt-phone" type="tel">
    </div>
    <div class="form-group">
      <label>意向区域（江夏XX村）</label>
      <input id="rt-area">
    </div>
    <div class="form-group">
      <label>租房类型</label>
      <select id="rt-type">
        <option>长租</option>
        <option>短租</option>
        <option>周末旅居</option>
      </select>
    </div>
    <div class="form-group">
      <label>预算月租（元）</label>
      <input id="rt-budget" type="number">
    </div>
    <div class="form-group">
      <label>入住人数</label>
      <input id="rt-people" type="number">
    </div>
    <div class="form-group">
      <label>必需要求</label>
      <input id="rt-needs" placeholder="独门独院,能做饭,可停车">
    </div>
    <div class="form-group">
      <label>计划入住时间</label>
      <input id="rt-date" type="date">
    </div>
    <div class="form-group">
      <label>其他需求</label>
      <textarea id="rt-remark" rows="3"></textarea>
    </div>
    <button onclick="submitRenter()">提交求租需求</button>
  </div>
</div>

<script>
function showPanel(type) {
  document.getElementById('landlord').style.display = type=='landlord'?'block':'none';
  document.getElementById('renter').style.display = type=='renter'?'block':'none';
  let tabs = document.querySelectorAll('.tab');
  tabs[0].classList.toggle('active', type=='landlord');
  tabs[1].classList.toggle('active', type=='renter');
}

function submitLandlord(){
  let name = document.getElementById('ll-name').value;
  let phone = document.getElementById('ll-phone').value;
  if(!name || !phone){alert('请填写姓名和电话');return;}
  alert('提交成功！');
  document.getElementById('landlord').reset();
}

function submitRenter(){
  let name = document.getElementById('rt-name').value;
  let phone = document.getElementById('rt-phone').value;
  if(!name || !phone){alert('请填写姓名和电话');return;}
  alert('提交成功！');
  document.getElementById('renter').reset();
}
</script>

</body>
</html>
